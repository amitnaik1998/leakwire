# .github/workflows/fetch.yml

name: Fetch & Classify

on:
  schedule:
    - cron: "*/60 * * * *"
  workflow_dispatch:

# Concurrency group — if a new run starts while one is already running,
# cancel the old one immediately. Only one pipeline run at a time, ever.
concurrency:
  group: fetch-pipeline
  cancel-in-progress: true

jobs:
  fetch:
    name: Run pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        run: uv run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LOG_LEVEL: INFO
          FETCH_TIMEOUT_SECONDS: 30
          MAX_RETRIES: 3

      - name: Ping heartbeat on success
        if: success()
        run: |
          curl -fsS "${{ secrets.UPTIMEROBOT_HEARTBEAT_URL }}" \
            -o /dev/null
